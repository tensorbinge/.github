<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 440" width="440" height="440">
  <defs>
    <marker id="arrow" markerWidth="5" markerHeight="4" refX="4" refY="2" orient="auto" markerUnits="strokeWidth">
      <polygon points="0,0 5,2 0,4" fill="#8b949e" opacity="0.50"/>
    </marker>
  </defs>
  <rect width="440" height="440" fill="#faf8f5"/>
  <g transform="translate(220, 195) scale(12) translate(-15, -20)">
    <!-- Big body (left) — T for Tensor -->
    <circle cx="9" cy="20" r="5" fill="#1a1a2e" fill-opacity="0.08" stroke="#1a1a2e" stroke-width="1.2"/>
    <text x="9" y="20" text-anchor="middle" dominant-baseline="central" font-family="'Courier New', Courier, monospace" font-size="6" font-weight="700" fill="#1a1a2e">T</text>
    <!-- Small bodies (right) — α, β -->
    <circle cx="22" cy="14" r="4" fill="#8b949e" fill-opacity="0.12" stroke="#8b949e" stroke-width="1"/>
    <text x="22" y="14" text-anchor="middle" dominant-baseline="central" font-family="'Courier New', Courier, monospace" font-size="5" font-weight="400" fill="#8b949e">α</text>
    <circle cx="22" cy="26" r="4" fill="#8b949e" fill-opacity="0.12" stroke="#8b949e" stroke-width="1"/>
    <text x="22" y="26" text-anchor="middle" dominant-baseline="central" font-family="'Courier New', Courier, monospace" font-size="5" font-weight="400" fill="#8b949e">β</text>
    <!-- Arrows: T → α, T → β -->
    <line x1="14" y1="19" x2="17.5" y2="14.2" stroke="#8b949e" stroke-width="0.5" opacity="0.50" marker-end="url(#arrow)"/>
    <line x1="14" y1="21" x2="17.5" y2="25.8" stroke="#8b949e" stroke-width="0.5" opacity="0.50" marker-end="url(#arrow)"/>
  </g>
  <text x="220" y="395" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="32"><tspan font-weight="700" fill="#1a1a2e">Tensor</tspan><tspan font-weight="400" fill="#8b949e">[Binge]</tspan></text>
</svg>
